mode: paper          # paper | live

pairs:
  - EURUSD
  - GBPUSD

risk_per_trade: 0.01  # 1% of account balance per trade

risk_limits:
  daily_loss_limit: 0.02        # stop trading if down 2% today
  weekly_loss_limit: 0.05       # stop trading if down 5% this week
  max_consecutive_losses: 3     # pause after 3 SL hits in a row
  min_account_balance: 3000     # USD — don't trade below this balance
  max_commission_pct: 0.10      # skip trade if commission > 10% of risk amount
  commission_per_lot: 2.0       # estimated IBKR forex commission per lot per side (USD)

strategy:
  asian_range_hours: 6      # hours of candles to define the Asian range
  pip_buffer: 5             # pips above/below range for entry + SL buffer
  tp_multiplier: 2.0        # TP = SL distance × this value
  max_trade_duration_hours: 6  # time-based exit if still open

schedule:
  time: "17:00"             # 5pm Sydney time
  timezone: "Australia/Sydney"

ib:
  host: "127.0.0.1"
  paper_port: 4002
  live_port: 7496
  client_id: 1

telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN_HERE"
  chat_id: "YOUR_TELEGRAM_CHAT_ID_HERE"

tax:
  default_usd_aud_rate: 1.54  # fallback if IB rate unavailable

db_path: "logs/trades.db"
